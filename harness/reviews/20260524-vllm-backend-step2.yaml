    notes: |
      All security checks pass.
      - Subprocess spawn: env_remove("DYLD_LIBRARY_PATH") / env_remove("LD_LIBRARY_PATH") present (vllm_backend.rs:86-87).
      - stdin/stdout piped(), stderr inherit() (vllm_backend.rs:88-90).
