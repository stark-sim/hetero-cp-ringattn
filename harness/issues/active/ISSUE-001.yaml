# 问题描述
description: |
  Pipeline Phase 2 in ring.rs does NOT stream compute: recv blocks are collected into Vec before processing, defeating the intended compute-communication overlap. Design: recv→process→forward per block. Implementation: recv ALL → sort → process ALL. Root cause: inner scope collects all blocks to release transport borrow before process_kv_block(&self). Fix: release transport borrow per block, process immediately, then re-acquire for forwarding.

